<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flux OS</title>
    <script src="script.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      body {
        background-color: #1e1e2e;
        color: #cdd6f4;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #boot-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        color: #0f0;
        z-index: 99999;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: monospace;
        font-size: 20px;
      }

      #desktop {
        flex-grow: 1;
        position: relative;
        padding: 20px;
        display: flex;
        flex-direction: row;
        gap: 20px;
        flex-wrap: wrap;
        align-content: flex-start;
      }
      .icon {
        width: 80px;
        text-align: center;
        cursor: pointer;
        padding: 10px;
        border-radius: 8px;
        transition: background 0.2s;
      }
      .icon:hover {
        background-color: rgba(255, 255, 255, 0.1);
      }
      .icon span {
        font-size: 32px;
        display: block;
        margin-bottom: 5px;
      }
      .icon p {
        font-size: 12px;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      }

      .window {
        position: absolute;
        width: 400px;
        background-color: #181825;
        border: 1px solid #45475a;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .window.hidden {
        display: none;
      }
      .window-header {
        background-color: #313244;
        padding: 10px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: grab;
        user-select: none;
        border-bottom: 1px solid #45475a;
      }
      .window-header:active {
        cursor: grabbing;
      }
      .close-btn {
        background-color: #f38ba8;
        border: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        cursor: pointer;
      }
      .window-content {
        padding: 20px;
        min-height: 200px;
        background-color: #11111b;
      }

      #term-output {
        font-family: "Courier New", Courier, monospace;
        color: #a6e3a1;
        height: 150px;
        overflow-y: auto;
        margin-bottom: 10px;
      }
      #term-input {
        background: #000;
        border: 1px solid #333;
        color: #fff;
        width: 100%;
        padding: 5px;
        font-family: monospace;
      }

      /* Formatting classes for the live space station data layout */
      .telemetry-line {
        font-family: monospace;
        margin-bottom: 8px;
        font-size: 13px;
      }
      .telemetry-val {
        color: #f9e2af;
        font-weight: bold;
      }

      #taskbar {
        height: 50px;
        background-color: #11111b;
        border-top: 1px solid #313244;
        display: flex;
        align-items: center;
        padding: 0 20px;
        z-index: 9999;
      }
      #clock {
        font-family: monospace;
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <div id="boot-screen">INITIALIZING FLUX OS... OK</div>

    <div id="desktop">
      <div class="icon" onclick="openWindow('window-terminal')">
        <span>&gt;_</span>
        <p>Terminal</p>
      </div>
      <div class="icon" onclick="openWindow('window-nasa')">
        <span>🚀</span>
        <p>NASA Uplink</p>
      </div>
      <div class="icon" onclick="openWindow('window-pet')">
        <span>👾</span>
        <p>Buddy</p>
      </div>
    </div>

    <div
      id="window-terminal"
      class="window hidden"
      style="top: 50px; left: 50px; width: 450px"
    >
      <div
        class="window-header"
        onmousedown="dragWindow(event, 'window-terminal')"
      >
        <span>Flux Terminal v1.0</span>
        <button
          class="close-btn"
          onclick="closeWindow('window-terminal')"
        ></button>
      </div>
      <div class="window-content">
        <div id="term-output">
          FluxOS Kernel loaded.<br />Type 'help' for available commands.
        </div>
        <input
          type="text"
          id="term-input"
          placeholder="admin@flux:~$ "
          onkeydown="handleTerminal(event)"
        />
      </div>
    </div>

    <div id="window-nasa" class="window hidden" style="top: 150px; left: 200px">
      <div class="window-header" onmousedown="dragWindow(event, 'window-nasa')">
        <span>Satellite Feed</span>
        <button class="close-btn" onclick="closeWindow('window-nasa')"></button>
      </div>
      <div class="window-content" id="nasa-content">
        <p style="color: #f9e2af; font-family: monospace;">Awaiting telemetry data...</p>
      </div>
    </div>

    <div
      id="window-pet"
      class="window hidden"
      style="top: 100px; left: 600px; width: 250px"
    >
      <div class="window-header" onmousedown="dragWindow(event, 'window-pet')">
        <span>Desktop Pet</span>
        <button class="close-btn" onclick="closeWindow('window-pet')"></button>
      </div>
      <div class="window-content" style="text-align: center; font-size: 40px">
        <p>ʕ•ᴥ•ʔ</p>
        <p style="font-size: 14px; margin-top: 10px">Idle...</p>
      </div>
    </div>

    <div id="taskbar"><div id="clock">00:00</div></div>

    <script>
      // Fallback base window wrappers to guarantee safety alongside external script loading
      window.addEventListener("load", () => {
        setTimeout(() => {
          const b = document.getElementById("boot-screen");
          if(b) {
            b.style.opacity = "0";
            b.style.transition = "0.5s";
            setTimeout(() => (b.style.display = "none"), 500);
          }
        }, 3000);
      });

      function handleTerminal(e) {
        if (e.key === "Enter") {
          const input = document.getElementById("term-input");
          const output = document.getElementById("term-output");
          const cmd = input.value.trim().toLowerCase();
          output.innerHTML += `<br>admin@flux:~$ ${cmd}`;

          if (cmd === "help")
            output.innerHTML += "<br>Commands: time, clear, version, reboot";
          else if (cmd === "time")
            output.innerHTML += `<br>${new Date().toLocaleTimeString()}`;
          else if (cmd === "clear") output.innerHTML = "Terminal Cleared.";
          else if (cmd === "version")
            output.innerHTML += "<br>Flux OS 1.0.0-Alpha";
          else if (cmd === "reboot") location.reload();
          else output.innerHTML += "<br>Command not found.";

          input.value = "";
          output.scrollTop = output.scrollHeight;
        }
      }

      // Base layout behavior
      function dragWindow(e, id) {
        const win = document.getElementById(id);
        if(typeof z !== 'undefined') { win.style.zIndex = ++z; }
        let p3 = e.clientX, p4 = e.clientY;
        document.onmousemove = (e) => {
          win.style.top = win.offsetTop - (p4 - e.clientY) + "px";
          win.style.left = win.offsetLeft - (p3 - e.clientX) + "px";
          p3 = e.clientX;
          p4 = e.clientY;
        };
        document.onmouseup = () => {
          document.onmousemove = null;
        };
      }

      setInterval(() => {
        const c = document.getElementById("clock");
        if(c) { c.innerText = new Date().toLocaleTimeString(); }
      }, 1000);
    </script>
  </body>
</html>
